<!DOCTYPE html>
<html lang=en>

<head>

    <meta charset=UTF-8>
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>우유 다 먹었니?</title>
    <style>
        body {
            background-color: green;
            overflow: hidden;
            display: flex;
            justify-content: center
        }

        .container {
            justify-content: center;
            width: 95vw;
            height: 90vh;
            margin-top: 20px;
            padding: 10px;
            border: 4px solid #414141;
            background-color: white;
            border-radius: 10px;
            display: block;
            align-items: center;
            justify-content: center
        }

        .title {
            height: 20vh;
            margin-top: 5vh;
            margin-left: 5vw;
            margin-right: 1vw;
            font-family: 'MaruBuriBold';
            font-size: 2rem;
            text-align: left;
            color: darkgreen;
        }

        .boxes {
            display: grid;
            width: 80%;

            /* 여기 아래의 코드를 고쳐주세요 8개씩 2줄 */
            grid-template-columns: repeat(8, 3fr);




            gap: 20px;
            margin: 140px
        }

        .box1 {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 5%;
            background-image: url('milk.JPG');
            background-repeat: no-repeat;
            background-size: cover;


        }

        .box1>p {
            position: absolute;
            top: 67px;
            left: 40px;
            text-align: center;
            font-size: 12px;
            background-color: #ffffff;

        }


        .box2 {
            position: relative;
            border-radius: 5%;
            width: 100px;
            height: 100px;
            background-image: url('milkclear-1.JPG');
            background-repeat: no-repeat;
            background-size: cover;
            animation: 3s linear 1s slidein infinite alternate;
            animation-name: moveUpDown;

        }

        .box2>p {
            position: absolute;
            top: -15px;
            text-align: center;
            font-size: 15px;
            background-color: #f76060;

        }

        @keyframes moveUpDown {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .bar {
            display: flex;
            justify-content: center;
            align-items: center
        }

        .bottom {
            display: flex;
            justify-content: center;
            align-items: center
        }

        #myProgress {
            position: relative;
            border-radius: 10px;
            width: 60%;
            height: 60px;
            background-color: #d4d4d4;
            display: flex
        }

        #myBar {
            position: absolute;
            width: 0;
            border-radius: 10px;
            height: 100%;
            background-color: #ea7a64
        }

        #copyright {
            position: absolute;
            top: 40px;
            right: 40px;
            border-radius: 3px;
            background-color: #f6c336;
            z-index: 100;
            padding: 2px
        }

        #copyright:hover {
            background-color: #e0e
        }
    </style>
    <link href=https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css rel=stylesheet>
</head>

<body>
    <div class=container>
        <div class=title id=title>
            <h1>우유 다 먹었어요?</h1>
        </div>
        <div class=bar id=bar>
            <div id=myProgress>
                <div id=myBar></div>
            </div>
            <div id=label style='margin-left:20px'></div>
        </div>
        <div class=bottom>
            <div class=boxes id=boxes></div>
        </div>
        <div id=copyright>만든사람</div>
    </div><audio id=cow>
        <source src=mooing-cow.mp3>
        </source>
    </audio>
</body>
<script>






    const container = document.getElementsByClassName("container")[0]; const title = document.getElementById("title"); const boxes = document.getElementById("boxes");
    class MilkBox {
        constructor(list, container, class1, class2) {
            this.list = list;
            this.class1 = class1;
            this.class2 = class2;
            this.drink = 0;
            this.container = container; this.date = new Date();
        }

        make() {
            for (let i = 1; i <= this.list.length; i++) {
                let div = document.createElement('div')
                div.classList.add(this.class1)
                div.innerHTML = "<p>" + this.list[i - 1] + "</p>";
                let self = this;
                div.addEventListener('click', function (e) {
                    if (e.target.tagName === 'P') { e.preventDefault(); }
                    else {

                        if (e.target.classList[0] == self.class1) {
                            document.getElementById('cow').play();
                            e.target.classList.add(self.class2);
                            e.target.classList.remove(self.class1)
                            self.drink++; var cal = ((self.drink / self.list.length) * 100).toFixed(0);
                            progress(self.drink);
                        }
                        else {
                            e.target.classList.add(self.class1); e.target.classList.remove(self.class2)
                            self.drink--; var cal = ((self.drink / self.list.length) * 100).toFixed(0); progress(self.drink);
                        }
                    }
                })
                this.container.appendChild(div);
            }
        }
    }

</html>
